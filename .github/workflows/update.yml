name: Auto Update

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: DeterminateSystems/nix-installer-action@92148bb48b9a0c5458c53dd0b368fbfbfbaa3210 # main

      - name: Check for updates
        id: check
        run: |
          chmod +x ./update.sh
          ./update.sh
          if git diff --quiet; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(grep 'version = ' package.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify build after update
        if: steps.check.outputs.updated == 'true'
        run: |
          nix flake check
          nix build .#kotlin-lsp
          test -x ./result/bin/kotlin-lsp

      - name: Create Pull Request
        if: steps.check.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          commit-message: "update: kotlin-lsp to ${{ steps.check.outputs.version }}"
          title: "update: kotlin-lsp to ${{ steps.check.outputs.version }}"
          body: |
            Automated update of kotlin-lsp to version `${{ steps.check.outputs.version }}`.

            This PR was created automatically by the update workflow.
          branch: auto-update/kotlin-lsp-${{ steps.check.outputs.version }}
          delete-branch: true
